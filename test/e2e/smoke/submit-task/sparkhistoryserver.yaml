apiVersion: spark.kubedoop.dev/v1alpha1
kind: SparkHistoryServer
metadata:
  name: test-sparkhistoryserver
spec:
  image:
    productVersion: ($values.product_version)
  clusterConfig:
    listenerClass: cluster-internal
    logFileDirectory:
      s3:
        prefix: events
        bucket:
          reference: spark-history
  node:
    roleGroups:
      default:
        replicas: 1
        # Postmortem note:
        # - This must stay under roleGroups.default.podOverrides (not under config),
        #   otherwise the StatefulSet keeps default resources and submit-task can fail.
        # - submit-task runs spark-submit inside the same HistoryServer container in local[1] mode,
        #   so HistoryServer JVM + submit JVM overlap; keep enough memory headroom.
        podOverrides:
          spec:
            containers:
              - name: node
                resources:
                  requests:
                    cpu: 1000m
                    memory: 3072Mi
                  limits:
                    cpu: 2000m
                    memory: 3072Mi
